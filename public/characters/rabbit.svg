<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Ears -->
  <ellipse cx="35" cy="20" rx="10" ry="24" fill="#F0F0F0"/>
  <ellipse cx="65" cy="20" rx="10" ry="24" fill="#F0F0F0"/>
  <ellipse cx="35" cy="20" rx="5" ry="18" fill="#FFB0C0"/>
  <ellipse cx="65" cy="20" rx="5" ry="18" fill="#FFB0C0"/>
  <!-- Face -->
  <circle cx="50" cy="58" r="32" fill="#F5F5F5"/>
  <!-- Eyes -->
  <circle cx="38" cy="52" r="5" fill="#fff"/>
  <circle cx="62" cy="52" r="5" fill="#fff"/>
  <circle cx="39" cy="53" r="3" fill="#4A2040"/>
  <circle cx="63" cy="53" r="3" fill="#4A2040"/>
  <circle cx="40" cy="51.5" r="1.2" fill="#fff"/>
  <circle cx="64" cy="51.5" r="1.2" fill="#fff"/>
  <!-- Nose -->
  <polygon points="50,60 47,63 53,63" fill="#FF8CA1"/>
  <!-- Mouth -->
  <path d="M47 65 Q50 69 53 65" fill="none" stroke="#8B6070" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Cheeks -->
  <ellipse cx="34" cy="62" rx="6" ry="4" fill="#FFD0DC" opacity="0.6"/>
  <ellipse cx="66" cy="62" rx="6" ry="4" fill="#FFD0DC" opacity="0.6"/>
  <!-- Teeth -->
  <rect x="47" y="65" width="3" height="4" rx="1" fill="#fff"/>
  <rect x="50" y="65" width="3" height="4" rx="1" fill="#fff"/>
</svg>
